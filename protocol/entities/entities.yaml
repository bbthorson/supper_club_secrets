# Entity Registry — Supper Club Secrets (Protocol Phase 1)
#
# Canonical, permanent, local IDs for every character, place, and item in the
# universe. This file is the committed source of truth that makes name -> ID
# resolution deterministic. See protocol/ARCHITECTURE.md §7 (Identity Model)
# and §13 (Phase 1), and protocol/entities/TASK.md for the full brief.
#
# =========================================================================
# Task A — Locked conventions (resolved from TASK.md §5)
# =========================================================================
#
#   1. ID SCHEME: `<type>.<slug>` — the scheme already used by place.* and
#      book.*. Characters -> `char.*`, places -> `place.*`, items -> `item.*`.
#      IDs are PERMANENT: they never change even when a displayName or filename
#      does. Slugs are lowercase, hyphen-separated.
#
#   2. ANTAGONIST NAMESPACE: antagonists ARE characters. Garrett Pike is
#      `char.garrett-pike`, not a separate `antagonist.*` namespace. (Decision 1)
#
#   3. REFERENCED-ONLY ENTITIES get minimal entries with `status: referenced`
#      so their references still resolve. Paolo Ferrante (named, no file) is the
#      Book 1 case. (Decision 2)
#
#   4. ALIAS COVERAGE: `aliases` must list every surface form a name appears as
#      in prose AND in chapter frontmatter — display names, nicknames, epithets.
#      This is what makes resolution work. The resolver (resolve.py) normalizes
#      a frontmatter value by stripping trailing "(...)" annotations before
#      matching, so aliases hold the BASE surface forms, not the annotations.
#      Pike is the sharp case: "the mogul" and "the developer" both appear as
#      pre-naming epithets and are registered aliases. (Decision 3)
#
#   5. FILE SHAPE: one file holds all entity types, grouped below by type.
#      Field set per entry: id, type, displayName, aliases, sourceFile, status.
#      (Decision 5)
#
#   6. FUTURE-BOOK ANTAGONISTS (book2–6) are registered as light stubs with
#      `status: future` so the namespace is reserved. (Decision 4)
#
# STATUS VALUES:
#   active      — appears on-page in finalized (v1) canon and has a file
#   referenced  — named in canon but has no file of its own
#   future      — reserved for a later book; file exists, not yet in play
#
# GOLDEN RULE: if a name in the prose/frontmatter and this registry disagree,
# the prose wins — fix the registry.
#
# NON-ENTITIES (deliberately NOT registered — one-off / background surfaces
# that appear in frontmatter as free text) are enumerated in `non_entities.yaml`
# so the resolver treats them as expected non-matches, not misses.

